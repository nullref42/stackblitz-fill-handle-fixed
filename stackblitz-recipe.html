 * useFillHandle — Userland drag-fill handle for MUI X DataGrid Premium.
 *
 * Adds an Excel-style fill handle to the bottom-right corner of the cell
 * selection.  The user drags it up or down to fill target cells with the
 * source values in a cycling pattern.
 *
 * Only PUBLIC DataGridPremium APIs are used — no internal imports.
 */

import { useEffect, useRef } from &#x27;react&#x27;;
import type {
  GridRowId,
  GridCellParams,
  GridColDef,
} from &#x27;@mui/x-data-grid-premium&#x27;;

// ---------------------------------------------------------------------------
// Types
// ---------------------------------------------------------------------------

/** The apiRef shape we depend on (subset of GridApiPremium). */
export interface FillHandleApi {
  rootElementRef: React.RefObject&lt;HTMLElement | null&gt;;
  getSelectedCellsAsArray: () =&gt; Array&lt;{ id: GridRowId; field: string }&gt;;
  getCellParams: (id: GridRowId, field: string) =&gt; GridCellParams;
  getColumn: (field: string) =&gt; GridColDef;
  setCellSelectionModel: (
    model: Record&lt;GridRowId, Record&lt;string, boolean&gt;&gt;,
  ) =&gt; void;
  getCellSelectionModel: () =&gt; Record&lt;GridRowId, Record&lt;string, boolean&gt;&gt;;
  getSortedRowIds: () =&gt; GridRowId[];
  getVisibleColumns: () =&gt; GridColDef[];
  updateRows: (updates: Array&lt;Record&lt;string, unknown&gt;&gt;) =&gt; void;
  subscribeEvent: (
    event: string,
    handler: (...args: unknown[]) =&gt; void,
  ) =&gt; () =&gt; void;
}

export interface FillUpdate {
  id: GridRowId;
  [field: string]: unknown;
}

type ApiRef = React.RefObject&lt;FillHandleApi&gt;;

// ---------------------------------------------------------------------------
// Hook
// ---------------------------------------------------------------------------

export function useFillHandle(
  apiRef: ApiRef,
  onFill?: (updates: FillUpdate[]) =&gt; void,
): void {
  // Keep onFill in a ref so the effect doesn&#x27;t re-run when it changes.
  const onFillRef = useRef(onFill);
  onFillRef.current = onFill;

  useEffect(() =&gt; {
    const api = apiRef.current;
    if (!api) return;

    // ── Drag state (plain variables — safe inside a single effect) ───
    let isDragging = false;
    let dragField = &#x27;&#x27;;
    let sourceStartIdx = -1;
    let sourceEndIdx = -1;
    let sourceValues: unknown[] = [];
    let currentTargetIds: GridRowId[] = [];
    let decoratedEls = new Set&lt;HTMLElement&gt;();
    let rafId = 0;

    // ── Helpers ──────────────────────────────────────────────────────

    function getRootEl(): HTMLElement | null {
      return api.rootElementRef?.current ?? null;
    }

    /** Locate a cell&#x27;s DOM element via data-attributes. */
    function getCellEl(
      rowId: GridRowId,
      field: string,
    ): HTMLElement | null {
      const root = getRootEl();
      if (!root) return null;
      const escapedId = CSS.escape(String(rowId));
      const escapedField = CSS.escape(field);
      return root.querySelector&lt;HTMLElement&gt;(
        `[data-id=&quot;${escapedId}&quot;] [data-field=&quot;${escapedField}&quot;]`,
      );
    }

    /** Strip all preview CSS classes from previously-decorated elements. */
    function clearPreviewClasses(): void {
      for (const el of decoratedEls) {
        el.classList.remove(
          &#x27;fill-preview&#x27;,
          &#x27;fill-preview-top&#x27;,
          &#x27;fill-preview-bottom&#x27;,
          &#x27;fill-preview-left&#x27;,
          &#x27;fill-preview-right&#x27;,
        );
      }
      decoratedEls = new Set();
    }

    /**
     * Resolve a dataset.id string to the matching GridRowId (which may
     * be a number).  Checks sorted IDs for both the raw string and its
     * numeric conversion.
     */
    function resolveRowId(raw: string): GridRowId | null {
      const sortedIds = api.getSortedRowIds();
      if (sortedIds.includes(raw as GridRowId)) return raw;
      const asNum = Number(raw);
      if (!Number.isNaN(asNum) &amp;&amp; sortedIds.includes(asNum)) return asNum;
      return null;
    }

    // ── 1. Position the fill handle on the bottom-right selected cell ─

    const unsubSelection = api.subscribeEvent(
      &#x27;cellSelectionChange&#x27;,
      () =&gt; {
        const root = getRootEl();
        if (!root) return;

        // Remove any existing marker
        root
          .querySelectorAll(&#x27;.fill-handle-cell&#x27;)
          .forEach((el) =&gt; el.classList.remove(&#x27;fill-handle-cell&#x27;));

        const selected = api.getSelectedCellsAsArray();
        if (selected.length === 0) return;

        const sortedIds = api.getSortedRowIds();
        const visibleCols = api.getVisibleColumns();

        let bestRowIdx = -1;
        let bestColIdx = -1;
        let bestCell: { id: GridRowId; field: string } | null = null;

        for (const cell of selected) {
          const ri = sortedIds.indexOf(cell.id);
          const ci = visibleCols.findIndex((c) =&gt; c.field === cell.field);
          if (ri &lt; 0 || ci &lt; 0) continue;
          if (
            ri &gt; bestRowIdx ||
            (ri === bestRowIdx &amp;&amp; ci &gt; bestColIdx)
          ) {
            bestRowIdx = ri;
            bestColIdx = ci;
            bestCell = cell;
          }
        }

        if (bestCell) {
          getCellEl(bestCell.id, bestCell.field)?.classList.add(
            &#x27;fill-handle-cell&#x27;,
          );
        }
      },
    );

    // ── 2. Detect mousedown on the fill handle ──────────────────────

    const unsubMouseDown = api.subscribeEvent(
      &#x27;cellMouseDown&#x27;,
      (...args: unknown[]) =&gt; {
        const params = args[0] as GridCellParams;
        const event = args[1] as React.MouseEvent&lt;HTMLElement&gt; &amp; {
          defaultMuiPrevented?: boolean;
        };

        const cellEl = getCellEl(params.id, params.field);
        if (!cellEl?.classList.contains(&#x27;fill-handle-cell&#x27;)) return;

        // Hit-test: pointer must be within 14 px of the cell&#x27;s
        // bottom-right corner (the fill handle zone).
        const rect = cellEl.getBoundingClientRect();
        if (
          rect.right - event.clientX &gt; 14 ||
          rect.bottom - event.clientY &gt; 14 ||
          event.clientX &gt; rect.right + 4 ||
          event.clientY &gt; rect.bottom + 4
        ) {
          return;
        }

        // Suppress the default MUI cell-selection drag
        event.preventDefault();
        event.stopPropagation();
        event.defaultMuiPrevented = true;

        // Check column is editable
        const colDef = api.getColumn(params.field);
        if (!colDef.editable) return;

        // Gather source cells in this column
        const selected = api.getSelectedCellsAsArray();
        const inField = selected.filter((c) =&gt; c.field === params.field);
        if (inField.length === 0) return;

        const sortedIds = api.getSortedRowIds();
        const indices = inField
          .map((c) =&gt; sortedIds.indexOf(c.id))
          .filter((i) =&gt; i &gt;= 0);
        if (indices.length === 0) return;

        isDragging = true;
        dragField = params.field;
        sourceStartIdx = Math.min(...indices);
        sourceEndIdx = Math.max(...indices);

        // Collect values in visual (sorted) order
        sourceValues = [];
        for (let i = sourceStartIdx; i &lt;= sourceEndIdx; i++) {
          const id = sortedIds[i];
          if (inField.some((c) =&gt; c.id === id)) {
            sourceValues.push(api.getCellParams(id, dragField).value);
          }
        }

        document.addEventListener(&#x27;mousemove&#x27;, onMouseMove);
        document.addEventListener(&#x27;mouseup&#x27;, onMouseUp);
      },
    );

    // ── 3. Mousemove — throttled via requestAnimationFrame ──────────

    function onMouseMove(e: MouseEvent): void {
      if (!isDragging) return;
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(() =&gt;
        handleMove(e.clientX, e.clientY),
      );
    }

    function handleMove(clientX: number, clientY: number): void {
      // Walk the elements under the pointer to find the target row
      const hits = document.elementsFromPoint(clientX, clientY);
      let targetRowId: GridRowId | null = null;

      for (const hit of hits) {
        let node: HTMLElement | null = hit as HTMLElement;
        while (node) {
          if (node.dataset?.id !== undefined) {
            targetRowId = resolveRowId(node.dataset.id);
            break;
          }
          node = node.parentElement;
        }
        if (targetRowId !== null) break;
      }

      if (targetRowId === null) {
        // Pointer left the grid — clear preview
        currentTargetIds = [];
        clearPreviewClasses();
        return;
      }

      const sortedIds = api.getSortedRowIds();
      const targetIdx = sortedIds.indexOf(targetRowId);
      if (targetIdx &lt; 0) return;

      // Build the list of rows to fill
      const newTargets: GridRowId[] = [];
      if (targetIdx &gt; sourceEndIdx) {
        // Filling downward
        for (let i = sourceEndIdx + 1; i &lt;= targetIdx; i++) {
          newTargets.push(sortedIds[i]);
        }
      } else if (targetIdx &lt; sourceStartIdx) {
        // Filling upward
        for (let i = targetIdx; i &lt; sourceStartIdx; i++) {
          newTargets.push(sortedIds[i]);
        }
      }
      // If targetIdx is within the source range → no fill → clear preview

      currentTargetIds = newTargets;

      // Apply preview decoration
      const nextDecorated = new Set&lt;HTMLElement&gt;();

      for (let i = 0; i &lt; newTargets.length; i++) {
        const el = getCellEl(newTargets[i], dragField);
        if (!el) continue;

        el.classList.add(
          &#x27;fill-preview&#x27;,
          &#x27;fill-preview-left&#x27;,
          &#x27;fill-preview-right&#x27;,
        );
        if (i === 0) el.classList.add(&#x27;fill-preview-top&#x27;);
        if (i === newTargets.length - 1) el.classList.add(&#x27;fill-preview-bottom&#x27;);

        nextDecorated.add(el);
      }

      // Remove classes from cells that left the target set
      for (const el of decoratedEls) {
        if (!nextDecorated.has(el)) {
          el.classList.remove(
            &#x27;fill-preview&#x27;,
            &#x27;fill-preview-top&#x27;,
            &#x27;fill-preview-bottom&#x27;,
            &#x27;fill-preview-left&#x27;,
            &#x27;fill-preview-right&#x27;,
          );
        }
      }

      decoratedEls = nextDecorated;
    }

    // ── 4. Mouseup — apply the fill and extend the selection ────────

    function onMouseUp(): void {
      document.removeEventListener(&#x27;mousemove&#x27;, onMouseMove);
      document.removeEventListener(&#x27;mouseup&#x27;, onMouseUp);
      cancelAnimationFrame(rafId);

      if (
        isDragging &amp;&amp;
        currentTargetIds.length &gt; 0 &amp;&amp;
        sourceValues.length &gt; 0
      ) {
        // Cycle source values into target rows
        const updates: FillUpdate[] = currentTargetIds.map((id, i) =&gt; ({
          id,
          [dragField]: sourceValues[i % sourceValues.length],
        }));

        api.updateRows(updates);
        onFillRef.current?.(updates);

        // Extend cell selection to include filled rows
        const model = { ...api.getCellSelectionModel() };
        for (const id of currentTargetIds) {
          if (!model[id]) model[id] = {};
          model[id][dragField] = true;
        }
        api.setCellSelectionModel(model);
      }

      // Reset
      isDragging = false;
      dragField = &#x27;&#x27;;
      sourceStartIdx = -1;
      sourceEndIdx = -1;
      sourceValues = [];
      currentTargetIds = [];
      clearPreviewClasses();
    }

    // ── Cleanup on unmount ──────────────────────────────────────────

    return () =&gt; {
      unsubSelection();
      unsubMouseDown();
      document.removeEventListener(&#x27;mousemove&#x27;, onMouseMove);
      document.removeEventListener(&#x27;mouseup&#x27;, onMouseUp);
      cancelAnimationFrame(rafId);
      clearPreviewClasses();
    };
  }, [apiRef]);
}
